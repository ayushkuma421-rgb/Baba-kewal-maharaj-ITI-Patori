<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Multi-Step Form</title>
<link rel="stylesheet" href="a.css">
</head>

<body>

<div class="container">

<h2>register</h2>

<!-- Step 1: Personal Details -->
<div class="step active">
    <h3>Personal Details</h3>
    <input type="text" placeholder="Full Name" required>
    <input type="date" required>
    <select required>
        <option>Gender</option>
        <option>Male</option>
        <option>Female</option>
    </select>

    <label>Upload Passport Photo</label>
    <input type="file" accept="image/*" onchange="previewImage(event)" required>
    <img id="preview">

    <button onclick="nextStep()">Next</button>
</div>

<!-- Step 2: Contact Details -->
<div class="step">
    <h3>Contact Details</h3>
    <input type="tel" placeholder="Mobile Number" required>
    <input type="email" placeholder="Email" required>
    <input type="text" placeholder="Address" required>
    <label for="state">State:</label>
<select id="state" required>
    <option value="">-- Select State --</option>
</select>

<br><br>

<label for="district" >District:</label>
<select id="district" required>
    <option value="">-- Select District --</option>
</select>
    <button onclick="prevStep()">Back</button>
    <button onclick="nextStep()">Next</button>
</div>

<!-- Step 3: Past Education -->
<div class="step">
    <h3>Last Education</h3>
    <select name="" id="" required>
        <option value="">Choose Highest Education</option>
        <option value="">10th</option>
        <option value="">12th</option>
    </select>
    <input type="number" id="marks" placeholder="Marks" oninput="calculate()">

<input type="text" id="percent" placeholder="Percentage" readonly required>
    <input type="text" name="" id="" placeholder="Name Of Board" required>
    <input type="text" name="" id="" placeholder="name Of College" required>
    <select name="" id="" required>
        <option value="">Types Of College</option>
        <option value="">Goverment</option>
        <option value="">Private</option>
    </select>
    <input type="text" name="" id="" placeholder="College Address" required>
    <button onclick="prevStep()">Back</button>
    <button onclick="nextStep()">Next</button>
</div>

<!-- Step 4: Present Education -->
<div class="step">
    <h3>Present Education</h3>
    <input type="text" placeholder="Course" required>
    <input type="text" placeholder="Roll" required>
    <input type="text" placeholder="Year" required>

    <button onclick="prevStep()">Back</button>
    <button onclick="nextStep()">Next</button>
</div>
<div class="step">
    <h3>Present Education</h3>
    <input type="text" placeholder="User ID" required>
    <input type="password" placeholder="Password" required>
    <input type="password" placeholder="Confirm Password" required>

    <button onclick="prevStep()">Back</button>
    <button onclick="submitForm()">Submit</button>
</div>
<p>I have account <a href="b.html">Login</a></p>
</div>
<script src="b.js"></script>
</body>
</html>
